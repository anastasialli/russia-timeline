<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>История России 1991–2022</title>
  <link rel="stylesheet" href="style-newspaper.css">
</head>
<body>

<header class="hero">
  <div class="hero-inner">
    <div class="hero-topline">
      <span>Основана в 1991 году</span>
      <span>Хроника эпохи · 49 событий</span>
      <span>1991 — 2022</span>
    </div>
    <div class="masthead-title">Хроника России</div>
    <div class="masthead-sub">История государства в документах и событиях</div>
    <img class="hero-photo"
         src="https://images.unsplash.com/photo-1547448415-e9f5b28e570d?auto=format&fit=crop&w=1600&q=80"
         alt="Красная площадь, Москва">
    <div class="hero-photo-caption">Красная площадь, Москва — символ новой России</div>
    <div class="hero-search-wrap">
      <input id="search" placeholder="Поиск по событиям, датам, категориям…">
    </div>
  </div>
</header>

<nav id="filters"></nav>
<main id="timeline"></main>

<div id="lightbox" class="lightbox">
  <img id="lightboxImg" alt="">
</div>

<script src="script.js"></script>
</body>
</html>
